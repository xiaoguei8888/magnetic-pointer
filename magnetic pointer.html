<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>magnetic pointer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-size: 1vmin;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            background-color: #171717;
            overflow: hidden;
        }

        .pointer {
            --width: 4rem;
            --height: 4rem;
            position: fixed;
            top: calc(var(--height) / -2);
            left: calc(var(--width) / -2);
            width: var(--width);
            height: var(--height);
            transition: all 0.2s ease-out;
            pointer-events: none;
        }

        .pointer div {
            position: absolute;
            width: 1rem;
            height: 1rem;
            border-width: 0.3rem;
            border-color: #17f700;
        }

        .pointer div:nth-child(1) {
            top: 0;
            left: 0;
            border-top-style: solid;
            border-left-style: solid;
        }

        .pointer div:nth-child(2) {
            top: 0;
            right: 0;
            border-top-style: solid;
            border-right-style: solid;
        }

        .pointer div:nth-child(3) {
            bottom: 0;
            left: 0;
            border-bottom-style: solid;
            border-left-style: solid;
        }

        .pointer div:nth-child(4) {
            bottom: 0;
            right: 0;
            border-bottom-style: solid;
            border-right-style: solid;
        }

        ._target {
            margin-bottom: 5rem;
        }

        p,
        section {
            font-family: Impact;
            font-size: 4rem;
            color: #f7f7f7;
            cursor: pointer;
        }

        section {
            padding: 5rem;
            background-color: #f7f7f7;
            color: #171717;
        }
    </style>
</head>

<body>
    <div class="pointer">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
    <p class="_target">HOVER ME</p>
    <p class="_target">HOVER ME WITH MOUSE</p>
    <section class="_target">HOVER ME</section>
</body>
<script>
    // JIEJOE produce
    // b站主页：https://space.bilibili.com/3546390319860710
    const pointer = {
        container: document.querySelector(".pointer"),
        current_target: null,
        init() {
            window.addEventListener("mousemove", this.move.bind(this));
            this.bind_targets_events();
        },
        move(e) {
            let x = e.clientX;
            let y = e.clientY;
            if (this.current_target) {
                const rect = this.current_target.getBoundingClientRect();
                const center_x = rect.left + rect.width / 2;
                const center_y = rect.top + rect.height / 2;
                x = center_x + (x - center_x) * 0.1;
                y = center_y + (y - center_y) * 0.1;
            }
            this.container.style.transform = `translate(${x}px, ${y}px)`;
        },
        bind_targets_events() {
            [...document.querySelectorAll("._target")].forEach(ele => {
                ele.onmouseenter = () => {
                    this.current_target = ele;
                    const rect = ele.getBoundingClientRect();
                    this.container.style.setProperty("--width", rect.width + innerWidth / 50 + "px");
                    this.container.style.setProperty("--height", rect.height + innerWidth / 50 + "px");
                };
                ele.onmouseleave = () => {
                    this.current_target = null;
                    this.container.style.setProperty("--width", "4rem");
                    this.container.style.setProperty("--height", "4rem");
                };
            });
        }
    };
    pointer.init();
</script>

</html>
